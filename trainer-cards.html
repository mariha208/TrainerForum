<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainer Cards â€” World Trainer Forum</title>
  <meta name="description"
    content="Browse verified trainers on World Trainer Forum. Filter by category, specialization, and rate." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            gold: '#F5C842',
            'gold-dim': '#B49164',
            'card-dark': '#0A2551',
            'card-darker': '#043b3b',
          },
          boxShadow: {
            'card': '0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2)',
            'card-hover': '0 20px 48px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.3)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Gradient top halves */
    .card-gradient-blue {
      background: linear-gradient(135deg, #0f2c6b 0%, #0e7490 100%);
    }

    .card-gradient-teal {
      background: linear-gradient(135deg, #065f46 0%, #0d9488 100%);
    }

    .card-gradient-purple {
      background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%);
    }

    .card-gradient-rose {
      background: linear-gradient(135deg, #881337 0%, #e11d48 100%);
    }

    .card-gradient-orange {
      background: linear-gradient(135deg, #78350f 0%, #f97316 100%);
    }

    .card-gradient-indigo {
      background: linear-gradient(135deg, #1e1b4b 0%, #6366f1 100%);
    }

    .trainer-card {
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s ease;
      cursor: pointer;
    }

    .trainer-card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.5);
    }

    /* Heartbeat pulse on like */
    @keyframes heartPop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.4);
      }

      70% {
        transform: scale(0.9);
      }

      100% {
        transform: scale(1);
      }
    }

    .heart-liked {
      animation: heartPop 0.35s ease forwards;
    }

    /* Shimmer skeleton loader */
    @keyframes shimmer {
      0% {
        background-position: -400px 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, #1e3a3a 25%, #2a4f4f 50%, #1e3a3a 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    /* Gold star shimmer */
    .star-gold {
      color: #F5C842;
    }

    /* Verified badge pulse */
    .badge-verified {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Responsive grid */
    #trainers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    /* Avatar ring shimmer */
    .avatar-ring {
      box-shadow: 0 0 0 4px #0A2551, 0 0 0 7px rgba(245, 200, 66, 0.35);
      transition: box-shadow 0.3s ease;
    }

    .trainer-card:hover .avatar-ring {
      box-shadow: 0 0 0 4px #0A2551, 0 0 0 8px rgba(245, 200, 66, 0.65);
    }

    .divider {
      border-color: rgba(255, 255, 255, 0.08);
    }
  </style>

  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="img/logo.svg">
</head>

<body class="bg-gray-950 min-h-screen">

  <!-- â”€â”€ HEADER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
  <header class="sticky top-0 z-50 bg-gray-950/90 backdrop-blur-md border-b border-gray-800 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center">
          <i class="fas fa-chalkboard-teacher text-gray-900 text-sm"></i>
        </div>
        <span class="font-bold text-white text-lg tracking-tight">World Trainer Forum</span>
      </div>

      <!-- Search bar -->
      <div class="hidden md:flex items-center gap-3 bg-gray-900 border border-gray-700 rounded-xl px-4 py-2.5 w-72">
        <i class="fas fa-search text-gray-500 text-sm"></i>
        <input id="search-input" type="text" placeholder="Search trainersâ€¦"
          class="bg-transparent text-sm text-white placeholder-gray-500 outline-none w-full" />
      </div>

      <div class="flex items-center gap-2">
        <span id="trainer-count"
          class="text-xs text-gray-400 bg-gray-800 px-3 py-1.5 rounded-full font-medium">Loadingâ€¦</span>
      </div>
    </div>
  </header>

  <!-- â”€â”€ CATEGORY FILTER PILLS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
  <section class="max-w-7xl mx-auto px-6 pt-8 pb-2">
    <div id="filter-pills" class="flex flex-wrap gap-2">
      <button data-cat="all"
        class="filter-pill active px-4 py-1.5 rounded-full text-sm font-semibold transition-all bg-amber-400 text-gray-900">
        All Trainers
      </button>
    </div>
  </section>

  <!-- â”€â”€ GRID â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="trainers-grid">
      <!-- Skeleton placeholders while loading -->
      ${[...Array(6)].map(() => `
      <div class="rounded-2xl overflow-hidden shadow-card" style="background:#0A2551">
        <div class="h-28 skeleton"></div>
        <div class="flex flex-col items-center px-5 pb-6 pt-12 gap-3">
          <div class="skeleton w-32 h-4 mt-1"></div>
          <div class="skeleton w-20 h-3"></div>
          <div class="skeleton w-full h-px mt-3"></div>
          <div class="flex justify-between w-full mt-2">
            <div class="skeleton w-24 h-3"></div>
            <div class="skeleton w-16 h-3"></div>
          </div>
        </div>
      </div>`).join('')}
    </div>

    <!-- Error state (hidden by default) -->
    <div id="error-state" class="hidden text-center py-20">
      <div class="text-5xl mb-4">ðŸ”Œ</div>
      <h3 class="text-white text-xl font-semibold mb-2">Could not load trainers</h3>
      <p class="text-gray-400 text-sm mb-6">The data source may be temporarily unavailable.</p>
      <button onclick="loadTrainers()"
        class="bg-amber-400 text-gray-900 font-semibold px-6 py-2.5 rounded-xl hover:bg-amber-300 transition-colors">
        <i class="fas fa-redo mr-2"></i>Retry
      </button>
    </div>

    <!-- Empty state (hidden by default) -->
    <div id="empty-state" class="hidden text-center py-20">
      <div class="text-5xl mb-4">ðŸ”</div>
      <h3 class="text-white text-xl font-semibold mb-2">No results found</h3>
      <p class="text-gray-400 text-sm">Try a different search or category.</p>
    </div>
  </main>

  <script>
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // CONFIG
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const API_URL = 'https://script.google.com/macros/s/AKfycbz9GGVlaEDMX92__cQZbFb3YfG5NjhtO3SNcxejsRNVv_CjmC_qAM098pmArwKakJ6V/exec';

    // Gradient pool â€” cycles through categories
    const GRADIENTS = [
      'card-gradient-blue',
      'card-gradient-teal',
      'card-gradient-purple',
      'card-gradient-rose',
      'card-gradient-orange',
      'card-gradient-indigo',
    ];

    const CAT_GRADIENT = {
      'AI & Technology': 'card-gradient-blue',
      'Business Coaching': 'card-gradient-purple',
      'Fitness & Health': 'card-gradient-teal',
      'Cybersecurity': 'card-gradient-rose',
      'Soft Skills': 'card-gradient-teal',
      'Language Training': 'card-gradient-orange',
      'Music & Dance': 'card-gradient-rose',
      'Career Mentoring': 'card-gradient-indigo',
      'Sports Coaching': 'card-gradient-teal',
      'Finance': 'card-gradient-indigo',
      'Motivational': 'card-gradient-orange',
    };

    let ALL_TRAINERS = [];
    let likedIds = new Set(JSON.parse(localStorage.getItem('wtf-liked') || '[]'));
    let gradientIdx = 0;

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // HELPERS
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function getInitials(name) {
      return String(name || 'TR')
        .trim()
        .split(/\s+/)
        .map(p => p[0] || '')
        .join('')
        .substring(0, 2)
        .toUpperCase() || 'TR';
    }

    function formatRate(rate) {
      const n = parseFloat(String(rate).replace(/[^\d.]/g, '')) || 0;
      if (!n) return 'On request<span class="text-gray-400 font-normal text-xs">/hr</span>';
      return 'â‚¹' + n.toLocaleString('en-IN') + '<span class="text-gray-400 font-normal text-xs">/hr</span>';
    }

    function pickGradient(category, idx) {
      return CAT_GRADIENT[category] || GRADIENTS[idx % GRADIENTS.length];
    }

    function saveLikes() {
      localStorage.setItem('wtf-liked', JSON.stringify([...likedIds]));
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // CARD BUILDER
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function buildCard(trainer, idx) {
      const {
        trainerId,
        fullName = 'Expert Trainer',
        tagline = '',
        category = 'General',
        specialization = '',
        experience = 0,
        rate = 0,
        profileImageUrl = '',
        whatsapp = '',
        linkedin = '',
        website = '',
      } = trainer;

      const id = String(trainerId || `T-${idx}`);
      const gradient = pickGradient(category, idx);
      const initials = getInitials(fullName);
      const isLiked = likedIds.has(id);
      const exp = parseInt(experience) || 0;
      const expLabel = exp > 0 ? `${exp} yr${exp !== 1 ? 's' : ''} exp` : '0 sessions';
      const rateHtml = formatRate(rate);
      const subText = specialization || category || 'Professional Trainer';

      // Safely cast socials
      const waStr = String(whatsapp || '').trim();
      const liStr = String(linkedin || '').trim();
      const webStr = String(website || '').trim();

      const waHref = waStr ? (waStr.startsWith('http') ? waStr : `https://wa.me/${waStr.replace(/\D/g, '')}`) : '#';
      const liHref = liStr ? (liStr.startsWith('http') ? liStr : `https://${liStr}`) : '#';
      const webHref = webStr ? (webStr.startsWith('http') ? webStr : `https://${webStr}`) : '#';

      const hasPhoto = profileImageUrl && profileImageUrl.startsWith('http');

      return `
        <article
          class="trainer-card rounded-2xl overflow-hidden shadow-card flex flex-col relative"
          data-id="${id}"
          data-category="${category}"
          style="background:#0A2551; min-height:360px;"
          onclick="openTrainer('${id}')"
          role="button"
          tabindex="0"
          aria-label="View profile of ${fullName}"
        >
          <!-- â”€â”€ TOP GRADIENT BANNER (40%) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
          <div class="relative ${gradient} flex-shrink-0" style="height:120px;">

            <!-- Heart button -->
            <button
              id="heart-${id}"
              onclick="toggleLike(event,'${id}')"
              class="absolute top-3 right-3 w-9 h-9 rounded-full flex items-center justify-center transition-colors"
              style="background:rgba(0,0,0,0.4); backdrop-filter:blur(4px);"
              aria-label="Save to favourites"
            >
              <i class="${isLiked ? 'fas' : 'far'} fa-heart text-sm ${isLiked ? 'text-red-400' : 'text-white/70'}"></i>
            </button>
          </div>

          <!-- â”€â”€ OVERLAPPING AVATAR (centered on seam) â”€â”€â”€â”€â”€â”€â”€â”€ -->
          <div class="absolute left-0 right-0 flex justify-center" style="top:80px; z-index:10;">
            <div class="avatar-ring w-20 h-20 rounded-full overflow-hidden border-4 border-card-dark flex items-center justify-center flex-shrink-0"
                 style="background:#0d3535;">
              ${hasPhoto
          ? `<img
                     src="${profileImageUrl}"
                     alt="${fullName}"
                     class="w-full h-full object-cover"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                   />
                   <div style="display:none;" class="w-full h-full items-center justify-center bg-teal-900">
                     <span class="text-white font-bold text-lg tracking-wide">${initials}</span>
                   </div>`
          : `<div class="w-full h-full flex items-center justify-center">
                     <span class="text-white font-bold text-lg tracking-wide">${initials}</span>
                   </div>`
        }
            </div>
          </div>

          <!-- â”€â”€ CARD BODY (bottom 60%) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
          <div class="flex flex-col flex-1 pt-14 pb-5 px-5 text-center">

            <!-- Name + verified badge -->
            <div class="flex items-center justify-center gap-2 flex-wrap mb-1">
              <h3 class="text-white font-bold text-base leading-tight">${fullName}</h3>
              <span class="badge-verified inline-flex items-center gap-1 bg-emerald-500/20 text-emerald-400 text-[10px] font-semibold px-2 py-0.5 rounded-full border border-emerald-500/30 flex-shrink-0">
                <i class="fas fa-check text-[8px]"></i>Verified
              </span>
            </div>

            <!-- Subtitle / specialization -->
            <p class="text-gray-300 text-xs leading-snug mb-4 px-2">${subText}</p>

            <!-- Social icons row -->
            <div class="flex items-center justify-center gap-4 mb-4" onclick="event.stopPropagation()">
              <a href="${waHref}" target="_blank" rel="noopener"
                 class="w-8 h-8 rounded-full flex items-center justify-center transition-transform hover:scale-110"
                 style="background:rgba(37,211,102,0.15);"
                 title="WhatsApp" ${waStr ? '' : 'style="opacity:0.35;pointer-events:none;"'}>
                <i class="fab fa-whatsapp text-green-400 text-sm"></i>
              </a>
              <a href="${liHref}" target="_blank" rel="noopener"
                 class="w-8 h-8 rounded-full flex items-center justify-center transition-transform hover:scale-110"
                 style="background:rgba(10,102,194,0.15);"
                 title="LinkedIn" ${liStr ? '' : 'style="opacity:0.35;pointer-events:none;"'}>
                <i class="fab fa-linkedin text-blue-400 text-sm"></i>
              </a>
              <a href="${webHref}" target="_blank" rel="noopener"
                 class="w-8 h-8 rounded-full flex items-center justify-center transition-transform hover:scale-110"
                 style="background:rgba(180,145,100,0.15);"
                 title="Website" ${webStr ? '' : 'style="opacity:0.35;pointer-events:none;"'}>
                <i class="fas fa-globe text-amber-400 text-sm"></i>
              </a>
            </div>

            <!-- Divider -->
            <hr class="divider border-t mb-4 mx-1" />

            <!-- Footer metrics row -->
            <div class="flex items-center justify-between px-1 mt-auto">

              <!-- Left: Stars + sessions -->
              <div class="flex flex-col items-start gap-0.5">
                <div class="flex items-center gap-1">
                  <span class="star-gold text-xs">â˜…â˜…â˜…â˜…â˜…</span>
                  <span class="text-white text-xs font-semibold">5.0</span>
                </div>
                <span class="text-gray-400 text-[10px]">${expLabel}</span>
              </div>

              <!-- Right: Rate -->
              <div class="text-right">
                <span class="text-amber-400 font-bold text-base leading-none">${rateHtml}</span>
              </div>
            </div>
          </div>
        </article>`;
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // RENDER
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderCards(list) {
      const grid = document.getElementById('trainers-grid');
      const empty = document.getElementById('empty-state');

      if (!list.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      grid.innerHTML = list.map((t, i) => buildCard(t, i)).join('');
    }

    function buildFilterPills(trainers) {
      const cats = [...new Set(trainers.map(t => t.category).filter(Boolean))];
      const container = document.getElementById('filter-pills');

      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.dataset.cat = cat;
        btn.className = 'filter-pill px-4 py-1.5 rounded-full text-sm font-medium transition-all bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700';
        btn.textContent = cat;
        btn.onclick = () => filterBy(cat);
        container.appendChild(btn);
      });

      document.querySelector('[data-cat="all"]').onclick = () => filterBy('all');
    }

    function filterBy(cat) {
      document.querySelectorAll('.filter-pill').forEach(p => {
        const isActive = p.dataset.cat === cat;
        p.className = `filter-pill px-4 py-1.5 rounded-full text-sm font-semibold transition-all border ${isActive
          ? 'bg-amber-400 text-gray-900 border-amber-400'
          : 'bg-gray-800 text-gray-300 hover:bg-gray-700 border-gray-700'
          }`;
      });

      const filtered = cat === 'all'
        ? ALL_TRAINERS
        : ALL_TRAINERS.filter(t => t.category === cat);

      renderCards(filtered);
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // LIKE TOGGLE
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function toggleLike(e, id) {
      e.stopPropagation();
      const btn = document.getElementById(`heart-${id}`);
      if (!btn) return;
      const icon = btn.querySelector('i');

      if (likedIds.has(id)) {
        likedIds.delete(id);
        icon.className = 'far fa-heart text-sm text-white/70';
      } else {
        likedIds.add(id);
        icon.className = 'fas fa-heart text-sm text-red-400';
        icon.classList.add('heart-liked');
        setTimeout(() => icon.classList.remove('heart-liked'), 400);
      }
      saveLikes();
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // SEARCH
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    document.getElementById('search-input').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim();
      if (!q) { renderCards(ALL_TRAINERS); return; }

      const filtered = ALL_TRAINERS.filter(t =>
        (t.fullName || '').toLowerCase().includes(q) ||
        (t.tagline || '').toLowerCase().includes(q) ||
        (t.specialization || '').toLowerCase().includes(q) ||
        (t.category || '').toLowerCase().includes(q)
      );
      renderCards(filtered);
    });

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // OPEN TRAINER PROFILE (hook into app.js if available)
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function openTrainer(id) {
      if (typeof viewTrainerProfileModal === 'function') {
        viewTrainerProfileModal(id);
      } else if (typeof openTrainerModal === 'function') {
        openTrainerModal(id);
      } else {
        console.log('[TrainerCard] Open modal for ID:', id);
      }
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // FETCH & BOOTSTRAP
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function loadTrainers() {
      const grid = document.getElementById('trainers-grid');
      const error = document.getElementById('error-state');
      const count = document.getElementById('trainer-count');

      error.classList.add('hidden');

      try {
        const res = await fetch('https://trainerforum.onrender.com/api/gsheet', { method: 'GET' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const list = Array.isArray(data) ? data : [data];

        ALL_TRAINERS = list;

        // Expose globally so app.js modals can find trainers
        if (typeof window.TRAINERS !== 'undefined') {
          window.TRAINERS.length = 0;
          list.forEach(t => window.TRAINERS.push(t));
        }

        count.textContent = `${list.length} Trainer${list.length !== 1 ? 's' : ''}`;
        buildFilterPills(list);
        renderCards(list);

      } catch (err) {
        console.error('Failed to load trainers:', err);
        grid.innerHTML = '';
        error.classList.remove('hidden');
        count.textContent = 'Error';
      }
    }

    // Kick off on DOM ready
    document.addEventListener('DOMContentLoaded', loadTrainers);
  </script>
<script src="js/mobile-nav.js"></script>
  <script src="js/footer.js"></script>
</body>
