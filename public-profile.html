<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trainer Profile | World Trainer Forum</title>
    <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="img/logo.svg">
</head>

<body>
    <div class="profile-container">
        <div class="header-card">
            <img id="pub-photo" src="img/default-avatar.svg" alt="Profile Photo">
            <h1 id="pub-name">Loading...</h1>
            <p id="pub-tagline"></p>
        </div>
        <div class="bio-section">
            <h3>About Me</h3>
            <p id="pub-bio"></p>
        </div>
        <div class="certs-section">
            <h3>Achievements</h3>
            <div id="pub-certs-list"></div>
        </div>
    </div>

    <script src="public-profile.js"></script>
<script src="js/mobile-nav.js"></script>
</body>

</html>
