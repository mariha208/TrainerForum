<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Notification System</title>
    <style>
        /* === Premium Dark Theme Variables === */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-hover: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            
            /* Accents */
            --badge-color: #ff5252;
            --blog-bg: rgba(3, 218, 198, 0.15);
            --blog-text: #03dac6;
            --event-bg: rgba(255, 183, 77, 0.15);
            --event-text: #ffb74d;
        }

        /* === Base Reset & Setup === */
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding-top: 80px;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
        }

        * {
            box-sizing: inherit;
        }

        /* === Notification Container === */
        .notification-container {
            position: relative;
        }

        /* === Bell Button === */
        #bell-btn {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.4rem;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
        }

        #bell-btn:hover, #bell-btn:focus-visible {
            background: #2a2a2a;
            transform: scale(1.05);
        }

        /* === Unread Badge === */
        #noti-badge {
            position: absolute;
            top: 2px;
            right: 4px;
            color: var(--badge-color);
            font-size: 0.9rem;
            display: none; /* Hidden by default via JS */
            text-shadow: 0 0 8px rgba(255, 82, 82, 0.6);
            animation: pulse 2s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }

        /* === Dropdown Menu === */
        #noti-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            right: -20px; /* Offset to align nicely */
            width: 340px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            /* Animation States */
            visibility: hidden;
            opacity: 0;
            transform-origin: top right;
            transform: scale(0.95) translateY(-10px);
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.25s;
        }
        
        #noti-dropdown.show {
            visibility: visible;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #noti-dropdown h4 {
            margin: 0;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* === Notification List === */
        #noti-list {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Custom Scrollbar */
        #noti-list::-webkit-scrollbar {
            width: 6px;
        }
        #noti-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        /* === List Items === */
        .noti-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: background 0.2s ease;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .noti-item:last-child {
            border-bottom: none;
        }

        .noti-item:hover, .noti-item:focus-visible {
            background: var(--surface-hover);
            outline: none;
        }

        .noti-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-badge {
            padding: 4px 8px;
            border-radius: 4px;
        }

        .type-blog {
            background: var(--blog-bg);
            color: var(--blog-text);
        }

        .type-event {
            background: var(--event-bg);
            color: var(--event-text);
        }

        .noti-time {
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: none;
        }

        .noti-title {
            font-size: 0.95rem;
            line-height: 1.4;
            font-weight: 400;
            color: #ececec;
        }
        
        .empty-state {
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- UI Elements -->
    <div class="notification-container">
        <button id="bell-btn" aria-label="Toggle notifications" aria-expanded="false">
            🔔 <span id="noti-badge" aria-hidden="true">●</span>
        </button>
        <div id="noti-dropdown" role="menu">
            <h4>Latest Updates</h4>
            <ul id="noti-list" role="menuitem"></ul>
        </div>
    </div>

    <script>
        /**
         * Raw Mock Data Stream
         * In production, this would be retrieved via an API / WebSocket
         */
        const FEED_DATA = [
            { id: 1, type: "Blog", title: "Top 5 Equestrian Training Routines", timestamp: 1770000000000 },
            { id: 2, type: "Event", title: "Annual Spring Trainer Symposium Announced!", timestamp: 1775000000000 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const bellBtn = document.getElementById('bell-btn');
            const notiBadge = document.getElementById('noti-badge');
            const notiDropdown = document.getElementById('noti-dropdown');
            const notiList = document.getElementById('noti-list');
            
            const STORAGE_KEY = 'latest_notification_read_time';
            
            // Allowable content types per requirements
            const ALLOWED_TYPES = ['Blog', 'Event', 'News & Event'];
            
            /**
             * Retrieve the last time the user checked their notifications
             */
            const getLastCheckedTime = () => parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
            
            /**
             * Formats Unix timestamps into clean, human-readable dates
             */
            const formatTime = (timestamp) => {
                const date = new Date(timestamp);
                return date.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    year: 'numeric' 
                });
            };

            /**
             * Filter data to strictly Blog & Event categories and sort by latest
             */
            const getProcessedFeed = () => {
                return FEED_DATA
                    .filter(item => ALLOWED_TYPES.includes(item.type))
                    .sort((a, b) => b.timestamp - a.timestamp);
            };

            /**
             * Check if there are any unseen notifications to toggle the badge
             */
            const evaluateUnreadState = () => {
                const lastChecked = getLastCheckedTime();
                const processedFeed = getProcessedFeed();
                
                // If any item timestamp is newer than our stored timestamp, show badge
                const hasUnread = processedFeed.some(item => item.timestamp > lastChecked);
                notiBadge.style.display = hasUnread ? 'block' : 'none';
            };

            /**
             * Populates the dropdown menu with feed items
             */
            const renderNotifications = () => {
                notiList.innerHTML = ''; // Clear existing
                const processedFeed = getProcessedFeed();

                if (processedFeed.length === 0) {
                    notiList.innerHTML = '<li class="empty-state">You are all caught up!</li>';
                    return;
                }

                processedFeed.forEach(item => {
                    const li = document.createElement('li');
                    
                    // Assign style classes based on item type
                    const isBlog = item.type.toLowerCase() === 'blog';
                    const badgeClass = isBlog ? 'type-blog' : 'type-event';
                    
                    // Construct visually distinct UI
                    li.innerHTML = `
                        <a href="#" class="noti-item">
                            <div class="noti-meta">
                                <span class="type-badge ${badgeClass}">${item.type}</span>
                                <span class="noti-time">${formatTime(item.timestamp)}</span>
                            </div>
                            <div class="noti-title">${item.title}</div>
                        </a>
                    `;
                    notiList.appendChild(li);
                });
            };

            /**
             * Handle notification bell interaction
             */
            bellBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent document click handler from instantly closing it
                
                const isShowing = notiDropdown.classList.contains('show');
                
                if (!isShowing) {
                    // Open dropdown state
                    notiDropdown.classList.add('show');
                    bellBtn.setAttribute('aria-expanded', 'true');
                    
                    // Update read-state in LocalStorage instantly to the newest item
                    const processedFeed = getProcessedFeed();
                    if (processedFeed.length > 0) {
                        const newestTimestamp = processedFeed[0].timestamp;
                        // Use Math.max to prevent marking future timestamps as read if system clocks mismatch
                        localStorage.setItem(STORAGE_KEY, Math.max(newestTimestamp, Date.now()).toString());
                    }
                    
                    // Remove the red alert badge instantly
                    notiBadge.style.display = 'none';
                    
                    // Render content
                    renderNotifications();
                } else {
                    // Close dropdown state
                    notiDropdown.classList.remove('show');
                    bellBtn.setAttribute('aria-expanded', 'false');
                }
            });

            /**
             * Close dropdown smoothly if clicking anywhere else on the page
             */
            document.addEventListener('click', (e) => {
                if (!bellBtn.contains(e.target) && !notiDropdown.contains(e.target)) {
                    notiDropdown.classList.remove('show');
                    bellBtn.setAttribute('aria-expanded', 'false');
                }
            });

            // Init process on page load
            evaluateUnreadState();
            renderNotifications(); // Pre-render so it slides in smoothly without DOM jumps
        });
    </script>
</body>
</html>
